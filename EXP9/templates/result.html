<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="profile-card-container">
    <div class="profile-card">
        <!-- Header with avatar -->
        <div class="profile-header">
            <div class="avatar-circle">
                <span class="avatar-initials">{{ name[0]|upper }}</span>
            </div>
            <h1 class="profile-name">{{ name }}'s Profile 🌟</h1>
            <p class="profile-tagline">✨ Amazing Person ✨</p>
        </div>
        
        <!-- Profile details -->
        <div class="profile-details">
            <div class="detail-item">
                <div class="detail-icon">💡</div>
                <div class="detail-content">
                    <span class="detail-label">Favorite Skill</span>
                    <span class="detail-value">{{ skill }}</span>
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">🎯</div>
                <div class="detail-content">
                    <span class="detail-label">Hobby</span>
                    <span class="detail-value">{{ hobby }}</span>
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">🚀</div>
                <div class="detail-content">
                    <span class="detail-label">Life Goal</span>
                    <span class="detail-value">{{ goal }}</span>
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">💻</div>
                <div class="detail-content">
                    <span class="detail-label">Favorite Language</span>
                    <span class="detail-value">{{ favorite_language }}</span>
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">💪</div>
                <div class="detail-content">
                    <span class="detail-label">Greatest Strength</span>
                    <span class="detail-value">{{ strength }}</span>
                </div>
            </div>
            
            <div class="detail-item">
                <div class="detail-icon">🍕</div>
                <div class="detail-content">
                    <span class="detail-label">Favorite Food</span>
                    <span class="detail-value">{{ favorite_food }}</span>
                </div>
            </div>
        </div>
        
        <!-- Action buttons -->
        <div class="profile-actions">
            <a href="/" class="btn btn-primary">📝 Create Another Profile</a>
            <a href="/view" class="btn btn-secondary">👥 View All Profiles</a>
        </div>
    </div>
</div>
</body>
</html>
